<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- network nodes connected by lines -->
  <line x1="16" y1="16" x2="6" y2="8"  stroke="#0f62fe" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="26" y2="8"  stroke="#0f62fe" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="16" y2="27" stroke="#0f62fe" stroke-width="2" stroke-linecap="round"/>
  <!-- hub node -->
  <circle cx="16" cy="16" r="4.5" fill="#0f62fe"/>
  <!-- leaf nodes -->
  <circle cx="6"  cy="8"  r="3" fill="#0f62fe" opacity="0.7"/>
  <circle cx="26" cy="8"  r="3" fill="#0f62fe" opacity="0.7"/>
  <circle cx="16" cy="27" r="3" fill="#0f62fe" opacity="0.7"/>
  <!-- search ring overlay -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#0f62fe" stroke-width="1.5" opacity="0.25"/>
</svg>
